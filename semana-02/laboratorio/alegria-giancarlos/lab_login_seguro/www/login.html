<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Seguro — Programación Segura</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-container {
            background: #16213e;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            width: 380px;
            border: 1px solid #0f3460;
        }
        h1 {
            color: #e94560;
            text-align: center;
            margin-bottom: 8px;
            font-size: 1.5rem;
        }
        .subtitle {
            color: #7a8499;
            text-align: center;
            font-size: 0.85rem;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #a0aec0;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            background: #0f3460;
            border: 1px solid #1a4a7a;
            border-radius: 6px;
            color: #e2e8f0;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #e94560;
        }
        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        button:hover { background: #c73652; }
        .security-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 20px;
            color: #48bb78;
            font-size: 0.8rem;
        }
        .lock-icon { font-size: 1rem; }
        .warning {
            background: #744210;
            border: 1px solid #b7791f;
            color: #fefcbf;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🔐 Portal Seguro</h1>
        <p class="subtitle">Programación Segura — DD281</p>
        
        <div class="warning">
            ⚠️ Certificado autofirmado — Solo para laboratorio
        </div>
        
        <!--
            PUNTOS DE SEGURIDAD IMPLEMENTADOS EN ESTE FORMULARIO:
            1. method="post" — credenciales en body, NO en URL
            2. action apunta al script CGI seguro
            3. autocomplete="off" — evita que el navegador guarde la contraseña en caché local
            4. El formulario solo funciona con HTTPS (verificado en el backend)
        -->
        <form method="post" action="/cgi-bin/login_seguro.py" autocomplete="off">
            <div class="form-group">
                <label for="usuario">Usuario:</label>
                <input 
                    type="text" 
                    id="usuario" 
                    name="usuario" 
                    required 
                    maxlength="50"
                    placeholder="tu.usuario"
                    autocomplete="username"
                >
            </div>
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    required 
                    maxlength="128"
                    placeholder="••••••••"
                    autocomplete="current-password"
                >
            </div>
            <button type="submit">Iniciar Sesión</button>
        </form>
        
        <div class="security-badge">
            <span class="lock-icon">🔒</span>
            <span>Conexión cifrada con TLS</span>
        </div>
    </div>
</body>
</html>
